name: CI
on: [pull_request]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup node version
        run: |
          echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # TODO This doesn't seem necessary
      - name: Remove .yarnrc file to avoid conflicts
        run: rm -rf .yarnrc

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare and activate Yarn version 1.22.22
        run: corepack prepare yarn@1.22.22 --activate

      - name: Verify Yarn version
        run: yarn --version

      - name: Install dependencies with frozen lockfile
        run: yarn install --frozen-lockfile

      - run: yarn eslint src

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup node version
        run: |
          echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Remove .yarnrc file to avoid conflicts
        run: rm -rf .yarnrc

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare and activate Yarn version 1.22.22
        run: corepack prepare yarn@1.22.22 --activate

      - name: Verify Yarn version
        run: yarn --version

      - name: Install dependencies with frozen lockfile
        run: yarn install --frozen-lockfile

      - name: Running tests
        env:
          REACT_APP_API_DOMAIN: http://localhost:8080
        run: yarn test

  playwright-tests:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup node version
        run: |
          echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Remove .yarnrc file to avoid conflicts
        run: rm -rf .yarnrc

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare and activate Yarn version 1.22.22
        run: corepack prepare yarn@1.22.22 --activate

      - name: Verify Yarn version
        run: yarn --version

      - name: Install dependencies with frozen lockfile
        run: yarn install --frozen-lockfile

      - name: Install Playwright dependencies
        run: yarn playwright install
      - name: Configure aws credentials for secrets
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::917902836630:role/github-oidc-build-secrets
          role-session-name: OIDC-GHA-Build-Secrets
          aws-region: us-east-1
      - name: Load Playwright environment
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            ,github/build
          parse-json-secrets: true
      - name: Running smoke tests
        env:
          PLAYWRIGHT_BASE_URL: https://web-uat.cmiml.net
          PLAYWRIGHT_API_BASE_URL: https://api-uat.cmiml.net
        run: |
          yarn test:smoke


  build:
    runs-on: ubuntu-latest
    needs: [unit-tests, playwright-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Setup node version
        run: |
          echo "NODE_VERSION=$(cat .nvmrc)" >> $GITHUB_ENV

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Remove .yarnrc file to avoid conflicts
        run: rm -rf .yarnrc

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare and activate Yarn version 1.22.22
        run: corepack prepare yarn@1.22.22 --activate

      - name: Verify Yarn version
        run: yarn --version

      - name: Install dependencies with frozen lockfile
        run: yarn install --frozen-lockfile

      - name: Build web app
        run: yarn build
